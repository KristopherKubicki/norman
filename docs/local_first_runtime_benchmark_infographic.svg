<rect x="48" y="1806" width="1704" height="330" rx="14" class="red"/>
<text x="74" y="1840" class="section">4. Incorporated audit caveats before promotion</text>
<text x="74" y="1878" class="card-title">Scorer repairs</text>
<text x="244" y="1878" class="text">Fix false negatives for escalate_only_if wording, release_route_gate exact</text>
<text x="244" y="1896" class="text">comparison, and aggregate/dedupe detection; rescore all completed rows.</text>
<text x="74" y="1930" class="card-title">Reproducibility</text>
<text x="244" y="1930" class="text">Packet must include runner/scorer source, source commit, exact commands,</text>
<text x="244" y="1948" class="text">Codex version, Bedrock profile/config hash, archive SHA256SUMS, and every</text>
<text x="74" y="1982" class="card-title">Provider truth</text>
<text x="244" y="1982" class="text">Capture requested and effective model, region, Bedrock request ID, response</text>
<text x="244" y="2000" class="text">ID, service tier, cache status, and route receipt.</text>
<text x="74" y="2034" class="card-title">Neutral prompts</text>
<text x="244" y="2034" class="text">Remove answers embedded in prompts. Cases must not assume 5.4 default or</text>
<text x="244" y="2052" class="text">5.5 final authority.</text>
<text x="920" y="1878" class="card-title">Separate gates</text>
<text x="1156" y="1878" class="text">Track transport, strict-format, capability, policy-safety,</text>
<text x="1156" y="1896" class="text">latency, and economic gates separately.</text>
<text x="920" y="1930" class="card-title">Fair matrix</text>
<text x="1156" y="1930" class="text">Run matched roles: Luna low, Terra medium, Sol high/xhigh,</text>
<text x="1156" y="1948" class="text">GPT-5.4 medium, GPT-5.5 high/xhigh, and direct OpenAI</text>
<text x="1156" y="1966" class="text">GPT-5.6 Flex where available.</text>
<text x="920" y="1982" class="card-title">Repetition and cache</text>
<text x="1156" y="1982" class="text">Randomize order, run at least three repetitions per case,</text>
<text x="1156" y="2000" class="text">and report cold, warm, and cached behavior.</text>
<text x="920" y="2034" class="card-title">Real hybrid flows</text>
<text x="1156" y="2034" class="text">Planner contract, sandboxed worker, tests, verifier,</text>
<text x="1156" y="2052" class="text">escalation, brokered tool calls, cancellation, timeout,</text>
<text x="1156" y="2070" class="text">and scope-violation cases.</text>
<text x="74" y="2180" class="subtitle">Bottom line: Norllama benchmark matrix now sits in the same release graphic as the Bedrock canary. Cloud model roles are candidates to test, not defaults to promote.</text>
<text x="74" y="2210" class="tiny">Source image SHA256: d5eb916c98f4ba881235fe7db043cb3406c7e11ab75500c1915fc4dfca98e59c</text>
