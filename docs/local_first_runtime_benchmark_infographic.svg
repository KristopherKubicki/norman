<title id="title">Norman local-first runtime, Norllama benchmark matrix, and Bedrock cloud fallback canary</title>
<desc id="desc">Infographic combining the Uplink Norllama benchmark matrix with the compact Bedrock GPT-5.4, GPT-5.5, and GPT-5.6 transport canary. It shows local-first routing and cloud fallback roles without changing production defaults.</desc>
