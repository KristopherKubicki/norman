<text x="1410" y="870" class="mono">9,970</text>
<text x="1094" y="936" class="card-title">Retained warm set</text>
<text x="1100" y="966" class="mono">gemma4:31b</text>
<text x="1100" y="986" class="small">Multi Agent. indirect_benchmark, benchmark_backed.</text>
<text x="1100" y="1010" class="mono">qwen3-coder-next:q4_K_M</text>
<text x="1100" y="1030" class="small">Code Flow. benchmark_backed.</text>
<text x="1100" y="1054" class="mono">gemma4:26b-a4b-it-q4_K_M</text>
<text x="1100" y="1074" class="small">LLM Prep, Web Crawl Static, Governed Drafts. benchmark_backed,</text>
<text x="1100" y="1090" class="small">indirect_benchmark.</text>
<text x="1100" y="1114" class="mono">bge-m3:latest</text>
<text x="1100" y="1134" class="small">Specialist dispatch: embedding_proxy, rerank_proxy,</text>
<text x="1100" y="1150" class="small">hybrid_pipeline; keep-alive 30m</text>
<text x="1094" y="1182" class="card-title">Packet guidance</text>
<text x="1100" y="1210" class="text">Use local benchmark winners for draft, prep, retrieval, and status</text>
<text x="1100" y="1228" class="text">work. Keep exact publishable facts, external actions, and promotions</text>
<text x="1100" y="1246" class="text">behind verifier or approval gates.</text>
<rect x="48" y="1320" width="1704" height="450" rx="14" class="gold"/>
