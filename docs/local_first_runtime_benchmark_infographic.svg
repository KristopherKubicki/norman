<text x="74" y="1144" class="section">3. Routing guidance from this run</text>
<text x="84" y="1182" class="card-title">Keep Bedrock GPT-5.4 as the default cloud fallback</text>
<text x="470" y="1182" class="text">It completed all six compact cases with strict JSON and no route failure. Two semantic misses are prompt/rubric wording, not model availability.</text>
<text x="84" y="1216" class="card-title">Do not promote GPT-5.5 as default</text>
<text x="470" y="1216" class="text">The xhigh run timed out on the revenue arithmetic cell under the 120s cap. Keep it as final authority/tiebreaker, not routine fallback.</text>
<text x="84" y="1250" class="card-title">Benchmark GPT-5.6 Luna and Terra harder</text>
<text x="470" y="1250" class="text">Both were much faster than 5.4/5.5 on this compact set with the same score profile as 5.4. Luna is the lowest-cost challenger; Terra is the same price class as 5.4.</text>
<text x="84" y="1284" class="card-title">Treat GPT-5.6 Sol as frontier challenger only</text>
<text x="470" y="1284" class="text">It completed the suite but had the lowest compact avg and costs the same class as 5.5. Use only where quality beats cost in larger gates.</text>
<text x="84" y="1318" class="card-title">Local/Norllama still owns the first pass</text>
<text x="470" y="1318" class="text">Status, supplied-state summaries, deterministic routing, and preprocessing should be answered locally before any cloud model is considered.</text>
<rect x="48" y="1392" width="1704" height="50" rx="8" class="panel"/>
<text x="68" y="1422" class="mono">Source artifacts: /tmp/norman_tui_benchmarks/gpt56_bedrock_matrix_20260714T190821Z/provider_readiness.json and per-cell Codex JSONL. Pricing uses Bedrock published OpenAI token rates current in this repo note.</text>
