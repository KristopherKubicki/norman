<rect class="bg" x="0" y="0" width="1800" height="2240"/>
<text x="54" y="58" class="title">Norman local-first runtime, Norllama benchmarks, and cloud fallback canary</text>
<text x="56" y="88" class="subtitle">Uplink Norllama packet plus Bedrock GPT-5.4/5.5/5.6 transport canary. Defaults stay local-first until stronger promotion evidence exists.</text>
<rect x="56" y="112" width="344" height="32" rx="8" class="pill"/>
<text x="72" y="133" class="mono">Norllama packet: 2026-07-08T20:55:11Z</text>
<rect x="416" y="112" width="296" height="32" rx="8" class="pill-green"/>
<text x="432" y="133" class="mono">Source: Uplink benchmark matrix</text>
<rect x="728" y="112" width="300" height="32" rx="8" class="pill-gold"/>
<text x="744" y="133" class="mono">Bedrock run: 20260714T190821Z</text>
<rect x="1044" y="112" width="330" height="32" rx="8" class="pill"/>
<text x="1060" y="133" class="mono">Policy: canary evidence, not promotion</text>
<rect x="48" y="168" width="1704" height="366" rx="14" class="green"/>
<text x="74" y="204" class="section">1. Overlay architecture to test next</text>
<rect x="76" y="242" width="220" height="154" rx="8" class="card"/>
<text x="94" y="274" class="card-title">TUI / Codex Client</text>
<text x="94" y="306" class="text">status? / task / tool call</text>
<text x="94" y="330" class="text">OpenAI-style facade or native TUI</text>
<text x="94" y="354" class="text">exact job id + session</text>
<rect x="352" y="242" width="220" height="154" rx="8" class="card"/>
<text x="370" y="274" class="card-title">Norman Prompt Layer</text>
<text x="370" y="306" class="text">intent prefilter</text>
<text x="370" y="330" class="text">risk + difficulty + regret</text>
<text x="370" y="354" class="text">single route envelope</text>
<rect x="628" y="242" width="220" height="154" rx="8" class="card"/>
<text x="646" y="274" class="card-title">Local Deterministic</text>
<text x="646" y="306" class="text">status fast path</text>
<text x="646" y="330" class="text">logs, counts, compaction</text>
<text x="646" y="354" class="text">no paid model when facts suffice</text>
<rect x="904" y="242" width="220" height="154" rx="8" class="card"/>
<text x="922" y="274" class="card-title">Norllama Mesh</text>
<text x="922" y="306" class="text">llm.home.arpa front door</text>
<text x="922" y="330" class="text">Spark workers + fallback node</text>
<text x="922" y="354" class="text">benchmark-backed local lanes</text>
<rect x="1180" y="242" width="220" height="154" rx="8" class="card"/>
<text x="1198" y="274" class="card-title">Bedrock Residue</text>
<text x="1198" y="306" class="text">Luna: narrow structured</text>
<text x="1198" y="330" class="text">Terra: normal cloud planning</text>
<text x="1198" y="354" class="text">Sol: high-regret ambiguity</text>
<rect x="1456" y="242" width="220" height="154" rx="8" class="card"/>
<text x="1474" y="274" class="card-title">Human Approval</text>
<text x="1474" y="306" class="text">external writes</text>
<text x="1474" y="330" class="text">irreversible action</text>
<text x="1474" y="354" class="text">authority boundary</text>
<path class="flow" d="M 296 320 L 352 320"/>
<path class="flow" d="M 572 320 L 628 320"/>
<path class="flow" d="M 848 320 L 904 320"/>
<path class="flow" d="M 1124 320 L 1180 320"/>
<path class="flow" d="M 1400 320 L 1456 320"/>
<rect x="232" y="426" width="520" height="54" rx="8" class="pill-green"/>
<text x="250" y="450" class="text">Rule: local deterministic and Norllama own first pass. Cloud</text>
<text x="250" y="468" class="text">must be justified by policy, quality, or regret.</text>
<rect x="782" y="426" width="640" height="54" rx="8" class="pill-gold"/>
<text x="800" y="450" class="text">Audit overlay: GPT-5.6 Luna/Terra/Sol are promising shadow canaries, not enough</text>
<text x="800" y="468" class="text">evidence to change production defaults.</text>
<rect x="48" y="566" width="1704" height="720" rx="14" class="blue"/>
<text x="74" y="600" class="section">2. Uplink Norllama benchmark matrix</text>
<text x="74" y="626" class="subtitle">The matrix is the actual Uplink-rendered benchmark board; the summary values below come from the same benchmark packet.</text>
