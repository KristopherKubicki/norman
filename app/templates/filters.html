{% extends "base.html" %}

{% block extra_css %}
<!-- Add any extra CSS required for this template here -->
{% endblock %}

{% block content %}
<h1>Filters</h1>

<div id="filters-status" class="alert alert-info d-none" role="alert"></div>

<div class="row g-4">
  <div class="col-lg-8">
    <div class="card p-3 mb-3">
      <div class="d-flex align-items-center justify-content-between mb-2">
        <h2 class="h5 mb-0">Filters</h2>
        <span class="badge bg-light text-dark" id="filters-count">0</span>
      </div>
      <div class="search-container">
        <input type="text" placeholder="Search filters..." class="form-control search-input">
      </div>
      <div class="filters-container list-group">
        <!-- Filters will be dynamically added here -->
      </div>
    </div>
  </div>

  <div class="col-lg-4">
    <form id="add-filter-form" class="card card-body">
      <h2 class="h5">Add Filter</h2>
      <div class="mb-3">
        <label for="filter-channel" class="form-label">Channel</label>
        <select id="filter-channel" class="form-select">
          <option value="" selected disabled>Loading channels...</option>
        </select>
      </div>
      <div class="mb-3">
        <label for="filter-regex" class="form-label">Regex</label>
        <input type="text" id="filter-regex" class="form-control" required />
      </div>
      <div class="mb-3">
        <label for="filter-description" class="form-label">Description</label>
        <input type="text" id="filter-description" class="form-control" />
      </div>
      <button type="submit" class="btn btn-primary">Create Filter</button>
    </form>
  </div>
</div>
<script src="{{ url_for('static', path='js/filters.js') }}" defer></script>
{% endblock %}
