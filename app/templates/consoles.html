{% extends "base.html" %}

{% block content %}
<div class="consoles-page subpage-shell">
  <div class="page-header subpage-header d-flex align-items-center justify-content-between mb-2 flex-wrap gap-2">
    <div>
      <div class="subpage-eyebrow">Advanced TUI</div>
      <div class="subpage-title">Tmux Inspector (Advanced)</div>
      <div class="subpage-subtitle">Power tools for tmux debugging. Daily control lives in Editor.</div>
    </div>
    <div class="d-flex gap-2 align-items-center flex-wrap">
      <a class="btn btn-outline-secondary btn-sm" href="/editor.html?pane=consoles">Back to Editor</a>
      <div class="d-flex align-items-center gap-2 flex-wrap">
        <label class="small text-muted mb-0" for="consoles-socket-select">Socket</label>
        <select class="form-select form-select-sm consoles-socket-select" id="consoles-socket-select"></select>
        <input type="text" class="form-control form-control-sm consoles-socket-custom d-none" id="consoles-socket-custom" placeholder="/tmp/tmux-1000/default">
        <button type="button" class="btn btn-outline-secondary btn-sm" id="consoles-socket-save">Save</button>
      </div>
      <button type="button" class="btn btn-outline-secondary btn-sm" id="consoles-refresh">Refresh</button>
    </div>
  </div>
  <div class="consoles-mobile-nav d-lg-none" role="tablist" aria-label="Consoles view">
    <button type="button" class="btn btn-sm btn-outline-secondary is-active" data-consoles-pane="viewer">Live</button>
    <button type="button" class="btn btn-sm btn-outline-secondary" data-consoles-pane="panes">Panes</button>
  </div>

  <div class="row g-3 consoles-layout">
    <div class="col-lg-3 consoles-col consoles-col--sidebar" id="consoles-pane-sidebar">
      <div class="card p-3 consoles-sidebar">
        <div class="d-flex align-items-center justify-content-between mb-2">
          <div class="section-title">Panes</div>
          <span class="badge bg-light text-dark" id="consoles-count">0</span>
        </div>
        <div class="d-flex align-items-center justify-content-between mb-2">
          <div class="small text-muted">Favorites</div>
          <button type="button" class="btn btn-outline-secondary btn-sm" id="consoles-favorites-refresh">Sync</button>
        </div>
        <div class="list-group menu-list mb-2" id="consoles-favorites-list" role="listbox" aria-label="saved console targets"></div>
        <input type="text" placeholder="Search panes..." class="form-control form-control-sm mb-2" id="consoles-search">
        <div class="list-group menu-list" id="consoles-pane-list" role="listbox" aria-label="tmux panes"></div>
      </div>
    </div>

    <div class="col-lg-9 d-flex flex-column consoles-col consoles-col--viewer" id="consoles-pane-viewer">
      <div class="card p-3 flex-grow-1 consoles-viewer d-flex flex-column">
        <div class="d-flex align-items-center justify-content-between mb-2 flex-wrap gap-2">
          <div>
            <div class="small text-muted">Selected pane</div>
            <div class="fw-semibold" id="consoles-selected">None</div>
            <div class="text-muted small" id="consoles-selected-meta">Pick a pane to view output.</div>
          </div>
          <div class="d-flex gap-2 align-items-center flex-wrap">
            <label class="small text-muted mb-0" for="consoles-lines">Lines</label>
            <select class="form-select form-select-sm" id="consoles-lines" style="width: 110px;">
              <option value="100">100</option>
              <option value="200" selected>200</option>
              <option value="400">400</option>
              <option value="800">800</option>
              <option value="1200">1200</option>
            </select>
            <div class="form-check form-switch m-0">
              <input class="form-check-input" type="checkbox" id="consoles-follow">
              <label class="form-check-label small text-muted" for="consoles-follow">Follow</label>
            </div>
            <button type="button" class="btn btn-primary btn-sm" id="consoles-capture" disabled>Capture</button>
            <button type="button" class="btn btn-outline-secondary btn-sm" id="consoles-favorite-save" disabled>Save</button>
          </div>
        </div>
        <div id="consoles-status" class="alert alert-info d-none" role="alert"></div>
        <pre class="console-output flex-grow-1" id="consoles-output" aria-live="polite"></pre>
      </div>
    </div>
  </div>
</div>

<script src="/static/js/consoles.js" defer></script>
{% endblock %}
