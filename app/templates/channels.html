
{% extends "base.html" %}

{% block content %}
    <h1>Channels</h1>

    <div id="channels-status" class="alert alert-info d-none" role="alert"></div>

    <div class="row g-4">
        <div class="col-lg-8">
            <div class="card p-3 mb-3">
                <div class="d-flex align-items-center justify-content-between mb-2">
                    <h2 class="h5 mb-0">Channels</h2>
                    <span class="badge bg-light text-dark" id="channels-count">0</span>
                </div>
                <div class="search-container">
                    <input class="form-control search-input" type="text" id="channelSearch" placeholder="Search channels...">
                </div>
                <div class="channels-container list-group menu-list">
                    <!-- Channels will be listed here -->
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card p-3">
                <h2 class="h5">Add a Channel</h2>
                <form id="add-channel-form" class="d-grid gap-2">
                    <input type="text" id="channel-name" class="form-control" placeholder="Channel name" required>
                    <label for="channel-connector" class="form-label">Connector</label>
                    <select class="form-select" id="channel-connector">
                        <option value="" selected disabled>Loading connectors...</option>
                    </select>
                    <button id="addChannelBtn" class="btn btn-primary" type="submit">Create Channel</button>
                </form>
                <div class="small text-muted mt-2">
                    Need a connector? <a href="/connectors.html">Open Connectors</a>
                </div>
            </div>

            <div class="card p-3 mt-3">
                <h2 class="h6">Sample Channels</h2>
                <p class="small text-muted">Generate example channels with seeded messages.</p>
                <button id="add-sample-channels" class="btn btn-outline-primary" type="button">Add sample channels</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', path='js/channels.js') }}" defer></script>
{% endblock %}
