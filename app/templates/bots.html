{% extends "base.html" %}

{% block content %}
<div class="subpage-shell">
  <div class="card p-4 text-center">
    <div class="subpage-title mb-2">Legacy Sessions Moved</div>
    <div class="subpage-subtitle mb-3">
      Norman now uses <a href="/editor.html">Editor</a> for work and <a href="/systems.html#agent-directory">Directory</a> for browsing routes.
      This older session surface is no longer part of the main flow.
    </div>
    <div class="d-flex justify-content-center gap-2 flex-wrap">
      <a class="btn btn-primary btn-sm" href="/editor.html">Open Editor</a>
      <a class="btn btn-outline-secondary btn-sm" href="/systems.html#agent-directory">Open Directory</a>
      <a class="btn btn-outline-secondary btn-sm" href="/index.html#prime">Norman Prime</a>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  (function () {
    const params = window.location.search || '';
    const target = `/editor.html${params}`;
    window.setTimeout(() => {
      window.location.replace(target);
    }, 350);
  })();
</script>
{% endblock %}
