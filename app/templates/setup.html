{% extends "base.html" %}
{% block content %}
<div class="container mt-5" style="max-width: 480px;">
    <form action="/setup" method="post" class="card p-4 shadow-sm">
        <h1 class="h4 mb-3 text-center">First-time Setup</h1>
        <p class="text-muted small mb-4">
            Enter the admin setup key from <code>config.yaml</code> to create the first admin user.
        </p>
        <div class="mb-3">
            <input type="password" class="form-control" name="setup_key" placeholder="Setup key" required>
        </div>
        <div class="mb-3">
            <input type="email" class="form-control" name="username" placeholder="Admin email" required>
        </div>
        <div class="mb-3">
            <input type="password" class="form-control" name="password" placeholder="Admin password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Create Admin</button>
    </form>
</div>
{% endblock %}
